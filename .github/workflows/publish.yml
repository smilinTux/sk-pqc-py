# Publish sk-pqc to PyPI via TRUSTED PUBLISHING (OIDC) — no API token stored anywhere.
# One-time setup (Chef, browser): https://pypi.org/manage/account/publishing/
#   PyPI project: sk-pqc · Owner: smilinTux · Repo: sk-pqc-py · Workflow: publish.yml · Environment: pypi
# Then publishing a GitHub Release triggers the upload.
name: Publish to PyPI
on:
  release:
    types: [published]
  workflow_dispatch: {}
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC — the trusted-publishing credential
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - run: pip install twine && twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
