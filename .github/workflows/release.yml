# Release sk-pqc to PyPI on a version tag, via PyPI Trusted Publishing (OIDC).
#
# NO API token is stored anywhere. PyPI mints a short-lived credential for THIS
# repo + THIS workflow + the `pypi` environment, verified over OIDC. See
# PUBLISHING.md for the one-time trusted-publisher registration and the full
# tag -> release flow.
#
# Flow:
#   1. Bump version in pyproject.toml + add a CHANGELOG.md section.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#   3. This workflow builds sdist+wheel, runs the byte-identity gate as a guard,
#      publishes to PyPI (OIDC), then cuts a GitHub Release with the artifacts.
#
# The tag is the trigger; the `pypi` environment + id-token are the credential.
name: release

on:
  push:
    tags:
      - "v*"
  # Lets you dry-run the build+gate (no publish) from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # --- Guard: build the artifacts and prove the byte-identity gate BEFORE we
  # publish anything. A broken tag must never reach PyPI. ---
  build:
    name: build + verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native build deps for liboqs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential libssl-dev git

      - name: Install package + test extra
        run: |
          python -m pip install --upgrade pip build twine
          python -m pip install -e ".[test]"

      - name: Byte-identity gate (must RUN, not skip)
        run: |
          python - <<'PY'
          from sk_pqc import pqkem
          assert pqkem.is_available(), (
              "liboqs/oqs not loadable — refusing to publish without the "
              "cross-impl PQ gate actually running"
          )
          PY
          python -m pytest -q

      - name: Tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c 'import importlib.metadata as m; print(m.version("sk-pqc"))')"
          echo "tag=$TAG  package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $PKG" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: twine check
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # --- Publish to PyPI via OIDC Trusted Publishing. No stored token. ---
  pypi-publish:
    name: publish to PyPI (OIDC)
    needs: build
    # Only real version tags publish; workflow_dispatch is build/gate only.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sk-pqc/
    permissions:
      id-token: write # OIDC — the trusted-publishing credential (no password)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # --- Cut the GitHub Release once PyPI has the artifacts. ---
  github-release:
    name: GitHub Release
    needs: pypi-publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "sk-pqc $GITHUB_REF_NAME — see CHANGELOG.md. Published to PyPI via Trusted Publishing (OIDC)." \
            dist/*
